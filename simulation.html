<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taktik-Simulation - Basketball Lernapp</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* --- Spezifische Styles für die Simulation --- */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Tieferes Blau statt Grün, um den "Anwendungs"-Bereich zu kennzeichnen */
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
            color: #f5f5f5;
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 2rem;
        }

        /* Wrapper für Button und Container nebeneinander */
        .simulation-wrapper {
            display: flex;
            gap: 2rem;
            align-items: flex-start;
            width: 100%;
            max-width: 1400px;
            position: relative;
        }

        .container {
            flex: 1;
            max-width: 1100px;
            min-height: 97vh;
            display: flex;
            flex-direction: column;
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(16px);
            border-radius: 40px;
            padding: 1rem 5rem 3rem 5rem;
            border: 2px solid #4db8ff;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 20px rgba(77, 184, 255, 0.15);
            text-align: center;
            opacity: 0;
            animation: slideInFromRight 0.8s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        h1 {
            font-size: 3rem;
            color: #4db8ff;
            text-shadow: 0 0 20px rgba(77, 184, 255, 0.4);
            margin-bottom: 1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .intro-text {
            font-size: 1.2rem;
            line-height: 1.6;
            color: #cbd5e1;
            max-width: 700px;
            margin: 0 auto 2rem auto;
        }

        /* Platzhalter für das Interface */
        .sim-interface-mockup {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(77, 184, 255, 0.3);
            border-radius: 24px;
            margin-bottom: 2rem;
            position: relative;
            overflow: hidden;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sim-interface-mockup::before {
            content: 'SIMULATIONS-MODUL';
            color: rgba(77, 184, 255, 0.2);
            font-weight: 900;
            font-size: 2rem;
            letter-spacing: 10px;
        }

        /* Bereich für die interaktiven Quadrate */
        .selection-area {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-top: 1rem;
            text-align: left;
            padding: 0 2rem;
        }

        .selection-item {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            cursor: pointer;
            group: hover;
        }

        .square-btn {
            width: 50px;
            height: 50px;
            background: #4db8ff;
            border-radius: 12px;
            flex-shrink: 0;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(77, 184, 255, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: #020617;
        }

        .selection-item:hover .square-btn {
            transform: scale(1.1);
            background: #fff;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.6);
        }

        /* Das Kreuz erscheint nur, wenn das Item die Klasse 'active' hat */
        .selection-item.active .square-btn::after {
            content: '✕';
            font-weight: bold;
        }

        .selection-text {
            font-size: 1.1rem;
            color: #cbd5e1;
        }

        .back-link {
            text-decoration: none;
            color: #4db8ff;
            font-weight: bold;
            border: 2px solid #4db8ff;
            padding: 1.2rem 4.5rem;
            font-size: 1.3rem;
            border-radius: 50px;
            transition: all 0.3s ease;
            white-space: nowrap;
            align-self: flex-start;
            position: sticky;
            top: 2rem;
            opacity: 0;
            animation: flyInFromTop 1s cubic-bezier(0.23, 1, 0.32, 1) 0.2s forwards;
        }

        .back-link:hover {
            background: #4db8ff;
            color: #0f172a;
            box-shadow: 0 0 20px rgba(77, 184, 255, 0.6);
            transform: translateY(-2px);
        }

        @keyframes flyInFromTop {
            0% { transform: translateY(-150%); opacity: 0; }
            100% { transform: translateY(0); opacity: 1; }
        }

        @media (max-width: 900px) {
            .simulation-wrapper {
                flex-direction: column;
                align-items: center;
            }
            .back-link {
                position: static;
                margin-bottom: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="simulation-wrapper">
        <a href="index.html" class="back-link">← Zurück</a>

        <div class="container">
            <h1>Taktik-Simulation</h1>
            <p class="intro-text">
                Analysiere die Situation auf dem Feld, triff taktische Entscheidungen und beobachte die Konsequenzen in Echtzeit.
            </p>

            <div class="sim-interface-mockup">
                <!-- Hier wird später die interaktive Simulation eingebettet -->
            </div>

            <div class="selection-area">
                <div class="selection-item">
                    <div class="square-btn"></div>
                    <p class="selection-text">Das ist der erste Testsatz für eine taktische Option.</p>
                </div>
                <div class="selection-item">
                    <div class="square-btn"></div>
                    <p class="selection-text">Hier folgt ein weiterer Testsatz zur Auswahl.</p>
                </div>
                <div class="selection-item">
                    <div class="square-btn"></div>
                    <p class="selection-text">Und hier ist der dritte Testsatz für die Simulation.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Logik für die exklusive Auswahl (nur ein Kreuz gleichzeitig)
        const selectionItems = document.querySelectorAll('.selection-item');
        
        selectionItems.forEach(item => {
            item.addEventListener('click', () => {
                selectionItems.forEach(i => i.classList.remove('active'));
                item.classList.add('active');
            });
        });
    </script>
</body>
</html>
