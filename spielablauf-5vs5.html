<html lang="de">
<head>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at top, rgba(255, 140, 0, 0.12), transparent 34rem),
                #171411;
            color: #f5f5f5;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        .container {
            width: min(1120px, calc(100% - 2rem));
            margin: 0 auto;
            padding: 2rem 0 3rem;
            text-align: center;
        }

        h1 {
            margin: 0;
            color: #ffaa33;
            font-size: clamp(2rem, 4vw, 3rem);
        }

        .chapter-intro {
            max-width: 820px;
            margin: 0.8rem auto 1.4rem;
            color: #d8d3ce;
            font-size: 1.05rem;
            line-height: 1.65;
        }

        .progress-track {
            width: min(100%, 1040px);
            height: 9px;
            margin: 0 auto 1rem;
            overflow: hidden;
            border: 1px solid #554c44;
            border-radius: 999px;
            background: #35302b;
        }

        .progress-fill {
            width: 0;
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, #ff8c00, #ffaa33);
            transition: width 0.35s ease;
        }

        .slider-wrapper {
            width: 100%;
            max-width: 1040px;
            margin: 0 auto;
        }

        .slide {
            min-height: 680px;
            padding: clamp(1.4rem, 3vw, 2.5rem);
            border: 2px solid #ff8c00;
            border-radius: 26px;
            background: #2d2a26;
            box-shadow: 0 14px 32px rgba(0, 0, 0, 0.48);
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
        }

        .slide-category {
            width: fit-content;
            margin: 0 auto -0.3rem;
            padding: 0.45rem 0.95rem;
            border: 1px solid rgba(255, 170, 51, 0.65);
            border-radius: 999px;
            background: rgba(255, 140, 0, 0.12);
            color: #ffaa33;
            font-size: 0.92rem;
            font-weight: 800;
        }

        .slide h2 {
            margin: 0;
            color: #ffaa33;
            font-size: clamp(1.5rem, 3vw, 2.05rem);
            line-height: 1.3;
        }

        .learning-text {
            width: min(100%, 900px);
            margin: 0 auto;
            padding: clamp(1.15rem, 2vw, 1.6rem);
            border: 1px solid #5c534b;
            border-radius: 18px;
            background: #37322e;
            text-align: left;
        }

        .learning-text p,
        .learning-text li {
            color: #f1efec;
            font-size: clamp(1.02rem, 1.55vw, 1.15rem);
            line-height: 1.78;
        }

        .learning-text p {
            margin: 0;
        }

        .learning-text p + p {
            margin-top: 0.9rem;
        }

        .learning-text ul {
            margin: 0;
            padding-left: 1.5rem;
        }

        .learning-text li + li {
            margin-top: 0.55rem;
        }

        .box-heading {
            margin: 0.15rem 0 -0.15rem;
            color: #d8d3ce;
            font-size: 1rem;
            font-weight: 700;
        }

        .learning-boxes {
            width: min(100%, 900px);
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 1rem;
        }

        .learning-box {
            min-height: 145px;
            padding: 1.15rem;
            border: 1px solid #655c53;
            border-left: 5px solid #ff8c00;
            border-radius: 16px;
            background: #24211e;
            display: grid;
            grid-template-columns: 54px minmax(0, 1fr);
            align-items: center;
            gap: 0.9rem;
            text-align: left;
            transition: transform 0.18s ease, border-color 0.18s ease;
        }

        .learning-box:hover {
            transform: translateY(-2px);
            border-color: #ffaa33;
        }

        .box-symbol {
            width: 50px;
            height: 50px;
            border-radius: 14px;
            background: rgba(255, 140, 0, 0.13);
            display: grid;
            place-items: center;
            font-size: 1.8rem;
        }

        .box-content strong {
            display: block;
            margin-bottom: 0.3rem;
            color: #ffaa33;
            font-size: 1.13rem;
            line-height: 1.3;
        }

        .box-content span {
            color: #e1ddd8;
            font-size: 0.98rem;
            line-height: 1.55;
        }

        .slider-nav {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            margin-top: 1.45rem;
        }

        .nav-btn-circle {
            width: 52px;
            height: 52px;
            border: none;
            border-radius: 50%;
            background: #ff8c00;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            display: grid;
            place-items: center;
            transition: transform 0.18s ease, background 0.18s ease;
        }

        .nav-btn-circle:hover:not(:disabled) {
            background: #ffaa33;
            transform: scale(1.08);
        }

        .nav-btn-circle:disabled {
            background: #555;
            color: #bbb;
            cursor: not-allowed;
        }

        .slide-counter {
            min-width: 135px;
            color: #d8d3ce;
            font-weight: 800;
        }

        .back-link {
            display: block;
            width: fit-content;
            margin: 1.6rem auto 0;
            padding: 0.8rem 1.2rem;
            border: 2px solid #ff8c00;
            border-radius: 999px;
            color: #ffaa33;
            text-decoration: none;
            font-weight: 800;
            transition: 0.2s ease;
        }

        .back-link:hover {
            background: #ff8c00;
            color: #171411;
        }

        .fade-in {
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(8px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

            .container {
                width: min(100% - 1rem, 1120px);
                padding-top: 1rem;

                min-height: 0;
                padding: 1.1rem;
                border-radius: 20px;
            }

                padding: 1rem;
            }

            .learning-boxes {
                grid-template-columns: 1fr;
            }

            .learning-box {
                min-height: 125px;
            }
        }

        @media (max-width: 430px) {
            .learning-box {
                grid-template-columns: 44px minmax(0, 1fr);
                gap: 0.7rem;
            }

            .box-symbol {
                width: 42px;
                height: 42px;
                font-size: 1.5rem;
            }

            .slide-counter {
                min-width: 110px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>

                text: `
                    <p>
                        Ein Spiel besteht aus vier Vierteln mit jeweils zehn Minuten Spielzeit.
                        Zwischen dem zweiten und dritten Viertel liegt die Halbzeitpause. Bei
                        Gleichstand folgen fünfminütige Verlängerungen, bis ein Sieger feststeht.
                        Bei Unterbrechungen stoppt die Spieluhr. Für einen Angriff stehen
                        normalerweise höchstens 24 Sekunden zur Verfügung.
                    </p>
                `,
                boxes: [
                    ["4️⃣", "Vier Viertel", "Ein Spiel besteht aus vier Spielabschnitten."],
                    ["🔟", "Zehn Minuten", "Jedes Viertel dauert zehn Minuten."],
                    ["5️⃣", "Verlängerung", "Bei Gleichstand folgen Viertel von fünf Minuten."],
                    ["24", "Wurfuhr", "Innerhalb von 24 Sekunden muss ein Wurfversuch erfolgen."]
                ]
            }
        ];

        const slide = document.getElementById("slide");
        const category = document.getElementById("category");
        const title = document.getElementById("title");
        const learningText = document.getElementById("learningText");
        const learningBoxes = document.getElementById("learningBoxes");
        const prevBtn = document.getElementById("prevBtn");
        const nextBtn = document.getElementById("nextBtn");
        const slideCounter = document.getElementById("slideCounter");
        const progressFill = document.getElementById("progressFill");

        let currentIndex = 0;

        function renderCard() {
            const card = cards[currentIndex];

            slide.classList.remove("fade-in");
            void slide.offsetWidth;
            slide.classList.add("fade-in");

            category.textContent = card.category;
            title.textContent = card.title;
            learningText.innerHTML = card.text;

            learningBoxes.innerHTML = card.boxes.map(box => `
                <div class="learning-box">
                    <div class="box-symbol">${box[0]}</div>
                    <div class="box-content">
                        <strong>${box[1]}</strong>
                        <span>${box[2]}</span>
                    </div>
                </div>
            `).join("");

            slideCounter.textContent = `Karte ${currentIndex + 1} von ${cards.length}`;
            progressFill.style.width = `${((currentIndex + 1) / cards.length) * 100}%`;

            prevBtn.disabled = currentIndex === 0;
            nextBtn.disabled = currentIndex === cards.length - 1;
        }

        prevBtn.addEventListener("click", () => {
            if (currentIndex > 0) {
                currentIndex--;
                renderCard();
            }
        });

        nextBtn.addEventListener("click", () => {
            if (currentIndex < cards.length - 1) {
                currentIndex++;
                renderCard();
            }
        });

        document.addEventListener("keydown", event => {
            if (event.key === "ArrowLeft" && currentIndex > 0) {
                currentIndex--;
                renderCard();
            }

            if (event.key === "ArrowRight" && currentIndex < cards.length - 1) {
                currentIndex++;
                renderCard();
            }
        });

        renderCard();
    </script>
</body>
</html>
